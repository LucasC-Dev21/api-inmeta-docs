name: CI/CD API Inmeta Docs

on:
  pull_request:
    branches: [production]
    types: [closed]

concurrency:
  group: inmeta-docs-production
  cancel-in-progress: true

jobs:
  test:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: inmeta_docs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/inmeta_docs_test?schema=public

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npx prisma generate

      - name: Rodar migrations
        run: npx prisma migrate deploy

      - name: Rodar testes
        run: npm run test

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Criar release artifact
        run: |
          set -euo pipefail
          rm -f release.tgz
          tar -czf release.tgz \
            package.json package-lock.json \
            tsconfig.json tsconfig.build.json \
            nest-cli.json \
            src prisma

      - name: Upload artifact para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: 'release.tgz'
          target: '/tmp/inmeta_deploy'
          strip_components: 0

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail

            APP_NAME="inmeta-docs"
            BASE_DIR="/var/www/backend/inmeta-docs"
            RELEASE_ID="$(date +'%Y-%m-%d_%H-%M-%S')"
            RELEASE_DIR="$BASE_DIR/releases/$RELEASE_ID"
            SHARED_DIR="$BASE_DIR/shared"
            TAR_PATH="/tmp/inmeta_deploy/release.tgz"

            echo "==> Base: $BASE_DIR"
            echo "==> Release: $RELEASE_DIR"

            # 1) Garante estrutura
            sudo mkdir -p "$BASE_DIR/releases" "$BASE_DIR/shared" "$BASE_DIR/logs"
            sudo chown -R "$USER":"$USER" "$BASE_DIR"

            # 2) Cria release e extrai pacote
            mkdir -p "$RELEASE_DIR"
            tar -xzf "$TAR_PATH" -C "$RELEASE_DIR"

            # 3) Linka .env do shared
            if [ -f "$SHARED_DIR/.env" ]; then
              ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
            fi

            cd "$RELEASE_DIR"

            # 4) Instala deps, gera prisma, roda migrations, build
            echo "==> npm ci"
            npm ci

            echo "==> prisma generate"
            npx prisma generate

            echo "==> prisma migrate deploy"
            npx prisma migrate deploy

            echo "==> build"
            npm run build

            echo "==> prune devDependencies"
            npm prune --omit=dev

            # 5) Troca symlink
            ln -sfn "$RELEASE_DIR" "$BASE_DIR/current"
            echo "==> current -> $RELEASE_DIR"

            # 6) PM2 reload ou start
            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
                echo "==> pm2 reload $APP_NAME"
                pm2 reload "$APP_NAME" --update-env
              else
                echo "==> pm2 start (primeira vez)"
                pm2 start npm --name "$APP_NAME" -- run start:prod
                pm2 save
              fi
            else
              echo "❌ pm2 não está instalado na VPS."
              exit 1
            fi

            # 7) Health check
            echo "==> healthcheck (aguardando até 60s)"
            ok=0
            for i in $(seq 1 30); do
              if curl -fsS "http://127.0.0.1:3000/health" >/dev/null 2>&1; then
                ok=1
                break
              fi
              echo "Aguardando app subir... ($i/30)"
              sleep 2
            done

            if [ "$ok" -ne 1 ]; then
              echo "❌ Healthcheck falhou. Debug:"
              pm2 status || true
              pm2 logs "$APP_NAME" --lines 200 --nostream || true
              ss -ltnp | grep ":3000" || true
              exit 1
            fi

            # 8) Limpeza (mantém últimas 5 releases)
            echo "==> cleanup old releases (keep 5)"
            ls -1dt "$BASE_DIR/releases"/* | tail -n +6 | xargs -r rm -rf

            echo "✅ Deploy concluído com sucesso."
