name: inmeta-docs-api

services:
  postgres:
    image: postgres:15
    container_name: postgres_inmeta_docs_api
    restart: always
    environment:
      POSTGRES_USER: inmeta
      POSTGRES_PASSWORD: inmeta
      POSTGRES_DB: inmeta
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
